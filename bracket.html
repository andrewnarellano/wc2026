<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>2026 FIFA World Cup — Bracket</title>
  <style>
    :root { --navy: #003277; --gold: #E8C21A; --gray: #4A5567; --green: #22c55e; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #003277; }
    body {
      background: linear-gradient(135deg, #003277 0%, #0058C7 50%, #0176FF 100%);
      min-height: 100vh;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }
    header {
      background: var(--navy); padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4); position: sticky; top: 0; z-index: 10;
    }
    .header-left h1 { font-size: 1.15rem; font-weight: 800; letter-spacing: 0.5px; }
    .header-left .subtitle { font-size: 0.75rem; color: var(--gold); margin-top: 2px; font-weight: 500; }
    .nav-buttons { display: flex; gap: 10px; }
    .nav-btn {
      background: var(--gold); color: var(--navy); border: none;
      padding: 9px 18px; border-radius: 6px; font-weight: 800; font-size: 0.82rem;
      cursor: pointer; text-decoration: none; display: inline-block; letter-spacing: 0.3px;
      transition: background 0.15s; white-space: nowrap; text-align: center;
    }
    .nav-btn:hover { background: #f5d020; }
    .hamburger {
      display: none; position: relative;
      font-size: 1.4rem; cursor: pointer;
      background: none; border: none; color: var(--gold);
      padding: 4px 8px; border-radius: 4px; line-height: 1;
    }
    .nav-dropdown {
      display: none; position: absolute; top: calc(100% + 10px); right: 0;
      background: var(--navy); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.55);
      min-width: 170px; z-index: 100; overflow: hidden;
    }
    .nav-dropdown a {
      display: block; padding: 13px 16px;
      color: #fff; text-decoration: none; font-weight: 600; font-size: 0.88rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      transition: background 0.12s;
    }
    .nav-dropdown a:last-child { border-bottom: none; }
    .nav-dropdown a:hover { background: rgba(255,255,255,0.1); }
    .nav-dropdown a.active { color: var(--gold); }
    .nav-dropdown.open { display: block; }
    .legend {
      display: flex; gap: 20px; padding: 10px 24px;
      background: rgba(0,0,0,0.25); font-size: 0.75rem; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .dot-green { background: var(--green); }
    .dot-tbd { background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.35); }
    .dot-matchday { background: transparent; border: 1.5px solid var(--green); box-shadow: 0 0 6px 1px rgba(34,197,94,0.6); }

    .bracket-scroll { overflow-x: auto; padding: 24px 20px 48px; -webkit-overflow-scrolling: touch; }
    .bracket-wrap { display: flex; align-items: flex-start; min-width: 1380px; }

    .scroll-hint {
      display: none;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      padding: 8px 0 0;
      letter-spacing: 0.3px;
    }
    @media (max-width: 900px) {
      .scroll-hint { display: block; }
      .bracket-scroll { padding: 12px 12px 40px; }
      .nav-buttons { display: none; }
      .hamburger { display: block; }
    }

    @media (max-width: 900px) and (orientation: portrait) {
      .header-left h1 { white-space: nowrap; font-size: 1rem; }
      .subtitle-sep { display: none; }
      .subtitle-date { display: block; }
      .legend { padding: 6px 14px; gap: 12px; font-size: 0.71rem; flex-wrap: nowrap; }
      .legend-dot { width: 8px; height: 8px; }
    }

    /* ── Match card — fixed 122px (28 header + 34 + 34 team rows + 26 venue) ── */
    .match {
      background: var(--navy); border-radius: 8px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.4);
      width: 210px; height: 122px; flex-shrink: 0;
      position: relative; overflow: visible;
    }
    .match.match-today {
      box-shadow: 0 0 0 2px var(--green), 0 0 18px 4px rgba(34,197,94,0.5), 0 3px 14px rgba(0,0,0,0.4);
    }
    .match-header {
      background: rgba(0,0,0,0.35); height: 28px; padding: 0 10px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      overflow: hidden; border-radius: 8px 8px 0 0;
    }
    .match-num { font-size: 0.62rem; font-weight: 800; color: var(--gold); letter-spacing: 0.8px; white-space: nowrap; }
    .match-dt  { font-size: 0.6rem; color: rgba(255,255,255,0.55); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; text-align: right; }
    .team-row {
      display: flex; align-items: center; gap: 7px; padding: 0 10px;
      height: 34px; font-size: 0.78rem; font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.05); overflow: hidden;
    }
    .team-row.winner { background: rgba(34,197,94,0.18); }
    .team-row.winner .team-label { color: var(--green); }
    .team-flag { font-size: 1rem; line-height: 1; flex-shrink: 0; min-width: 1.1rem; display: inline-block; }
    .team-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .team-label.tbd { color: rgba(255,255,255,0.32); font-style: italic; font-weight: 400; font-size: 0.7rem; }
    /* Venue row — bottom of tile, differentiated with muted gold */
    .venue-row {
      height: 26px; padding: 0 10px;
      display: flex; align-items: center;
      font-size: 0.62rem; font-weight: 500;
      color: rgba(232,194,26,0.65);
      border-top: 1px solid rgba(255,255,255,0.05);
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      border-radius: 0 0 8px 8px;
    }

    /* ── Right stub from every match (horizontal line into the gap) ── */
    /* H=122, center = 61px */
    .match::after {
      content: ''; position: absolute;
      right: -14px; top: 61px;
      width: 14px; height: 1px;
      background: rgba(255,255,255,0.14); pointer-events: none;
    }
    .final-col .match::after { display: none; }

    /* ── Round columns ── */
    .round-col { display: flex; flex-direction: column; flex-shrink: 0; }
    .round-label { visibility: hidden; height: 28px; }

    /* ── Sticky round labels bar (outside bracket-scroll to avoid overflow-x scroll container) ── */
    .round-labels-sticky {
      position: sticky; top: 0; z-index: 6; overflow: hidden;
      background: var(--navy); border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .round-labels-inner { display: flex; padding-left: 20px; }
    .rl-item {
      flex-shrink: 0; width: 210px;
      font-size: 0.7rem; font-weight: 800; letter-spacing: 1.2px; color: var(--gold);
      text-transform: uppercase; text-align: center; height: 28px;
      display: flex; align-items: center; justify-content: center; white-space: nowrap;
    }
    .rl-item + .rl-item { margin-left: 28px; }
    @media (max-width: 900px) {
      .round-labels-inner { padding-left: 12px; }
    }
    .round-matches { display: flex; flex-direction: column; }

    /* ── R32 ──
       H=122, g=8 (within pair), G=22 (between pairs)
       center=61, pair-height=252, midpoint=126
       vertical: top=61, height=130 (191−61)
       horizontal: top=126
    */
    .r32-col { width: 210px; }
    .r32-col .round-matches { gap: 22px; }
    .r32-pair { display: flex; flex-direction: column; gap: 8px; position: relative; overflow: visible; }
    .r32-pair::after {
      content: ''; position: absolute;
      right: -14px; top: 61px; width: 1px; height: 130px;
      background: rgba(255,255,255,0.14); pointer-events: none;
    }
    .r32-pair::before {
      content: ''; position: absolute;
      right: -28px; top: 126px; width: 14px; height: 1px;
      background: rgba(255,255,255,0.14); pointer-events: none;
    }

    /* ── R16 ──
       padding-top=(H+g)/2=(122+8)/2=65  gap=H+g+G=152
       group: center1=61, center2=335 (122+152+61), midpoint=198, vertical height=274
    */
    .r16-col { width: 210px; margin-left: 28px; }
    .r16-col .round-matches { padding-top: 65px; gap: 152px; }
    .r16-group { display: flex; flex-direction: column; gap: 152px; position: relative; overflow: visible; }
    .r16-group::after {
      content: ''; position: absolute;
      right: -14px; top: 61px; width: 1px; height: 274px;
      background: rgba(255,255,255,0.14); pointer-events: none;
    }
    .r16-group::before {
      content: ''; position: absolute;
      right: -28px; top: 198px; width: 14px; height: 1px;
      background: rgba(255,255,255,0.14); pointer-events: none;
    }

    /* ── QF ──
       padding-top=202  gap=426
       group: center1=61, center2=609 (122+426+61), midpoint=335, vertical height=548
    */
    .qf-col { width: 210px; margin-left: 28px; }
    .qf-col .round-matches { padding-top: 202px; gap: 426px; }
    .qf-group { display: flex; flex-direction: column; gap: 426px; position: relative; overflow: visible; }
    .qf-group::after {
      content: ''; position: absolute;
      right: -14px; top: 61px; width: 1px; height: 548px;
      background: rgba(255,255,255,0.14); pointer-events: none;
    }
    .qf-group::before {
      content: ''; position: absolute;
      right: -28px; top: 335px; width: 14px; height: 1px;
      background: rgba(255,255,255,0.14); pointer-events: none;
    }

    /* ── SF ──
       padding-top=476
       group: center1=61, center2=1157 (122+974+61), midpoint=609, vertical height=1096
       sf gap (within group) = 974
    */
    .sf-col { width: 210px; margin-left: 28px; }
    .sf-col .round-matches { padding-top: 476px; }
    .sf-group { display: flex; flex-direction: column; gap: 974px; position: relative; overflow: visible; }
    .sf-group::after {
      content: ''; position: absolute;
      right: -14px; top: 61px; width: 1px; height: 1096px;
      background: rgba(255,255,255,0.14); pointer-events: none;
    }
    .sf-group::before {
      content: ''; position: absolute;
      right: -28px; top: 609px; width: 14px; height: 1px;
      background: rgba(255,255,255,0.14); pointer-events: none;
    }

    /* ── Final — padding-top aligns center with SF midpoint ── */
    .final-col { width: 210px; margin-left: 28px; }
    .final-inner { padding-top: 1024px; display: flex; flex-direction: column; gap: 20px; }
    .third-label {
      font-size: 0.6rem; font-weight: 800; color: rgba(255,255,255,0.38);
      letter-spacing: 0.8px; text-align: center; padding: 4px 0 2px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>2026 FIFA World Cup</h1>
    <div class="subtitle">Knockout Bracket<span class="subtitle-sep"> &nbsp;·&nbsp; </span><span class="subtitle-date">Updated Jun 29, 2026</span></div>
  </div>
  <div class="nav-buttons">
    <a href="groups.html" class="nav-btn">Group Stage</a>
    <a href="pickem.html" class="nav-btn">Pick'em</a>
  </div>
  <button class="hamburger" id="hamburger" aria-label="Navigation menu">&#9776;
    <div class="nav-dropdown" id="navDropdown">
      <a href="groups.html">Group Stage</a>
      <a href="bracket.html" class="active">Bracket</a>
      <a href="pickem.html">Pick'em</a>
      <a href="howtoplay.html">How to Play</a>
    </div>
  </button>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot dot-green"></div> Winner</div>
  <div class="legend-item"><div class="legend-dot dot-matchday"></div> Matchday</div>
</div>

<div class="round-labels-sticky" id="roundLabelsBar">
  <div class="round-labels-inner" id="roundLabelsInner">
    <span class="rl-item">Round of 32</span>
    <span class="rl-item">Round of 16</span>
    <span class="rl-item">Quarterfinals</span>
    <span class="rl-item">Semifinals</span>
    <span class="rl-item">Final</span>
  </div>
</div>
<div class="scroll-hint">← swipe to see full bracket →</div>
<div class="bracket-scroll">
  <div class="bracket-wrap" id="bw"></div>
</div>

<script>
// Times shown in CT (ET − 1 hr)
// winner: 0=t1, 1=t2, null=TBD  |  score: [t1,t2] or null

const r32Pairs = [
  { r16num:89, matches:[
    { num:74,  date:"Jun 29", time:"2:30 PM CT",  venue:"Gillette Stadium · Foxborough MA",
      t1:{flag:"🇩🇪",name:"Germany"},          t2:{flag:"🇵🇾",name:"Paraguay"},    winner:null,score:[1,1] },
    { num:77,  date:"Jun 30", time:"3:00 PM CT",  venue:"MetLife Stadium · E. Rutherford NJ",
      t1:{flag:"🇫🇷",name:"France"},            t2:{flag:"🇸🇪",name:"Sweden"},    winner:null,score:null },
  ]},
  { r16num:90, matches:[
    { num:73,  date:"Jun 28", time:"1:00 PM CT",  venue:"SoFi Stadium · Inglewood CA",
      t1:{flag:"🇨🇦",name:"Canada"},           t2:{flag:"🇿🇦",name:"South Africa"},  winner:0,score:[1,0] },
    { num:75,  date:"Jun 29", time:"7:00 PM CT",  venue:"Estadio BBVA · Guadalupe MX",
      t1:{flag:"🇳🇱",name:"Netherlands"},      t2:{flag:"🇲🇦",name:"Morocco"},       winner:null,score:null },
  ]},
  { r16num:93, matches:[
    { num:84,  date:"Jul 2",  time:"1:00 PM CT",  venue:"SoFi Stadium · Inglewood CA",
      t1:{flag:"🇪🇸",name:"Spain"},           t2:{flag:"🇦🇹",name:"Austria"},      winner:null,score:null },
    { num:83,  date:"Jul 2",  time:"5:00 PM CT",  venue:"BMO Field · Toronto ON",
      t1:{flag:"🇵🇹",name:"Portugal"},           t2:{flag:"🇭🇷",name:"Croatia"},      winner:null,score:null },
  ]},
  { r16num:94, matches:[
    { num:82,  date:"Jul 1",  time:"2:00 PM CT",  venue:"Lumen Field · Seattle WA",
      t1:{flag:"🇧🇪",name:"Belgium"},           t2:{flag:"🇸🇳",name:"Senegal"},   winner:null,score:null },
    { num:81,  date:"Jul 1",  time:"6:00 PM CT",  venue:"Levi's Stadium · Santa Clara CA",
      t1:{flag:"🇺🇸",name:"United States"},    t2:{flag:"🇧🇦",name:"Bosnia-Herzegovina"},    winner:null,score:null },
  ]},
  { r16num:91, matches:[
    { num:76,  date:"Jun 29", time:"11:00 AM CT", venue:"NRG Stadium · Houston TX",
      t1:{flag:"🇧🇷",name:"Brazil"},            t2:{flag:"🇯🇵",name:"Japan"},      winner:0,score:[2,1] },
    { num:78,  date:"Jun 30", time:"11:00 AM CT", venue:"AT&T Stadium · Arlington TX",
      t1:{flag:"🇨🇮",name:"Ivory Coast"},      t2:{flag:"🇳🇴",name:"Norway"},        winner:null,score:null },
  ]},
  { r16num:92, matches:[
    { num:79,  date:"Jun 30", time:"7:00 PM CT",  venue:"Estadio Banorte · Mexico City",
      t1:{flag:"🇲🇽",name:"Mexico"},            t2:{flag:"🇪🇨",name:"Ecuador"},    winner:null,score:null },
    { num:80,  date:"Jul 1",  time:"10:00 AM CT", venue:"Mercedes-Benz Stadium · Atlanta GA",
      t1:{flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",name:"England"},           t2:{flag:"🇨🇩",name:"Congo DR"},   winner:null,score:null },
  ]},
  { r16num:95, matches:[
    { num:86,  date:"Jul 3",  time:"4:00 PM CT",  venue:"Hard Rock Stadium · Miami Gardens FL",
      t1:{flag:"🇦🇷",name:"Argentina"},         t2:{flag:"🇨🇻",name:"Cape Verde"},       winner:null,score:null },
    { num:88,  date:"Jul 3",  time:"12:00 PM CT", venue:"AT&T Stadium · Arlington TX",
      t1:{flag:"🇦🇺",name:"Australia"},          t2:{flag:"🇪🇬",name:"Egypt"},      winner:null,score:null },
  ]},
  { r16num:96, matches:[
    { num:85,  date:"Jul 2",  time:"9:00 PM CT",  venue:"BC Place · Vancouver BC",
      t1:{flag:"🇨🇭",name:"Switzerland"},       t2:{flag:"🇩🇿",name:"Algeria"},    winner:null,score:null },
    { num:87,  date:"Jul 3",  time:"7:30 PM CT",  venue:"Arrowhead Stadium · Kansas City MO",
      t1:{flag:"🇨🇴",name:"Colombia"},          t2:{flag:"🇬🇭",name:"Ghana"},    winner:null,score:null },
  ]},
];

// R16 ordered for visual bracket alignment: groups (89,90), (93,94), (91,92), (95,96)
// so that each group feeds the same QF: 97, 98, 99, 100
const r16 = [
  { num:89, date:"Jul 4",  time:"3:00 PM CT",  venue:"NRG Stadium · Houston TX",
    t1:{flag:"",name:"W74"}, t2:{flag:"",name:"W77"}, winner:null,score:null },
  { num:90, date:"Jul 4",  time:"11:00 AM CT", venue:"Lincoln Financial Field · Philadelphia PA",
    t1:{flag:"🇨🇦",name:"Canada"}, t2:{flag:"",name:"W75"}, winner:null,score:null },
  { num:93, date:"Jul 6",  time:"1:00 PM CT",  venue:"AT&T Stadium · Arlington TX",
    t1:{flag:"",name:"W84"}, t2:{flag:"",name:"W83"}, winner:null,score:null },
  { num:94, date:"Jul 6",  time:"6:00 PM CT",  venue:"Lumen Field · Seattle WA",
    t1:{flag:"",name:"W82"}, t2:{flag:"",name:"W81"}, winner:null,score:null },
  { num:91, date:"Jul 5",  time:"2:00 PM CT",  venue:"MetLife Stadium · E. Rutherford NJ",
    t1:{flag:"🇧🇷",name:"Brazil"}, t2:{flag:"",name:"W78"}, winner:null,score:null },
  { num:92, date:"Jul 5",  time:"6:00 PM CT",  venue:"Estadio Banorte · Mexico City",
    t1:{flag:"",name:"W79"}, t2:{flag:"",name:"W80"}, winner:null,score:null },
  { num:95, date:"Jul 7",  time:"10:00 AM CT", venue:"Mercedes-Benz Stadium · Atlanta GA",
    t1:{flag:"",name:"W86"}, t2:{flag:"",name:"W88"}, winner:null,score:null },
  { num:96, date:"Jul 7",  time:"2:00 PM CT",  venue:"BC Place · Vancouver BC",
    t1:{flag:"",name:"W85"}, t2:{flag:"",name:"W87"}, winner:null,score:null },
];

const qf = [
  { num:97,  date:"Jul 9",  time:"2:00 PM CT",  venue:"Gillette Stadium · Foxborough MA",
    t1:{flag:"",name:"W89"}, t2:{flag:"",name:"W90"}, winner:null,score:null },
  { num:98,  date:"Jul 10", time:"1:00 PM CT",  venue:"SoFi Stadium · Inglewood CA",
    t1:{flag:"",name:"W93"}, t2:{flag:"",name:"W94"}, winner:null,score:null },
  { num:99,  date:"Jul 11", time:"3:00 PM CT",  venue:"Hard Rock Stadium · Miami Gardens FL",
    t1:{flag:"",name:"W91"}, t2:{flag:"",name:"W92"}, winner:null,score:null },
  { num:100, date:"Jul 11", time:"7:00 PM CT",  venue:"Arrowhead Stadium · Kansas City MO",
    t1:{flag:"",name:"W95"}, t2:{flag:"",name:"W96"}, winner:null,score:null },
];

const sf = [
  { num:101, date:"Jul 14", time:"1:00 PM CT", venue:"AT&T Stadium · Arlington TX",
    t1:{flag:"",name:"W97"}, t2:{flag:"",name:"W98"}, winner:null,score:null },
  { num:102, date:"Jul 15", time:"1:00 PM CT", venue:"Mercedes-Benz Stadium · Atlanta GA",
    t1:{flag:"",name:"W99"}, t2:{flag:"",name:"W100"},winner:null,score:null },
];

const finalMatch = {
  num:104, date:"Jul 19", time:"1:00 PM CT", venue:"MetLife Stadium · E. Rutherford NJ",
  t1:{flag:"",name:"W101"}, t2:{flag:"",name:"W102"}, winner:null,score:null
};
const thirdPlace = {
  num:103, date:"Jul 18", time:"3:00 PM CT", venue:"Hard Rock Stadium · Miami Gardens FL",
  t1:{flag:"",name:"L101"}, t2:{flag:"",name:"L102"}, winner:null,score:null
};

// ── Render ────────────────────────────────────────────────────────────────────
function isTbd(n) { return /^(W|L)\d+$/.test(n) || /^(1st|2nd|3rd)/.test(n); }

const _todayLabel = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});

function matchCard(m) {
  const w1=m.winner===0, w2=m.winner===1, s=m.score;
  const isToday = m.date === _todayLabel && m.winner === null;
  function row(t, win, sc) {
    return `<div class="team-row${win?' winner':''}">
      <span class="team-flag">${t.flag||''}</span>
      <span class="team-label${isTbd(t.name)?' tbd':''}">${t.name}</span>
      ${sc!=null?`<span style="font-size:.8rem;font-weight:800;color:${win?'var(--green)':'#fff'};">${sc}</span>`:''}
    </div>`;
  }
  return `<div class="match${isToday?' match-today':''}">
    <div class="match-header">
      <span class="match-num">MATCH ${m.num}</span>
      <span class="match-dt">${m.date} · ${m.time}</span>
    </div>
    ${row(m.t1,w1,s?s[0]:null)}
    ${row(m.t2,w2,s?s[1]:null)}
    <div class="venue-row">${m.venue}</div>
  </div>`;
}

const bw = document.getElementById('bw');
let html = '';

// R32
html += '<div class="round-col r32-col"><div class="round-label">Round of 32</div><div class="round-matches">';
for (const p of r32Pairs) html += `<div class="r32-pair">${p.matches.map(matchCard).join('')}</div>`;
html += '</div></div>';

// R16 — 4 groups of 2
html += '<div class="round-col r16-col"><div class="round-label">Round of 16</div><div class="round-matches">';
for (let i=0;i<r16.length;i+=2)
  html += `<div class="r16-group">${matchCard(r16[i])}${matchCard(r16[i+1])}</div>`;
html += '</div></div>';

// QF — 2 groups of 2
html += '<div class="round-col qf-col"><div class="round-label">Quarterfinals</div><div class="round-matches">';
for (let i=0;i<qf.length;i+=2)
  html += `<div class="qf-group">${matchCard(qf[i])}${matchCard(qf[i+1])}</div>`;
html += '</div></div>';

// SF — 1 group of 2
html += '<div class="round-col sf-col"><div class="round-label">Semifinals</div><div class="round-matches">';
html += `<div class="sf-group">${sf.map(matchCard).join('')}</div>`;
html += '</div></div>';

// Final + 3rd Place
html += `<div class="round-col final-col">
  <div class="round-label">Final</div>
  <div class="final-inner">
    ${matchCard(finalMatch)}
    <div>
      <div class="third-label">3RD PLACE</div>
      ${matchCard(thirdPlace)}
    </div>
  </div>
</div>`;

bw.innerHTML = html;

// ── Sticky round labels ───────────────────────────────────────────────────────
const _labelsBar   = document.getElementById('roundLabelsBar');
const _labelsInner = document.getElementById('roundLabelsInner');
const _bScroll     = document.querySelector('.bracket-scroll');
const _mainHeader  = document.querySelector('header');

function _updateLabelTop() {
  _labelsBar.style.top = _mainHeader.offsetHeight + 'px';
}
_updateLabelTop();
window.addEventListener('resize', _updateLabelTop);
_bScroll.addEventListener('scroll', function() {
  _labelsInner.style.transform = `translateX(-${this.scrollLeft}px)`;
});

document.getElementById('hamburger').addEventListener('click', function(e) {
  e.stopPropagation();
  document.getElementById('navDropdown').classList.toggle('open');
});
document.addEventListener('click', () => {
  document.getElementById('navDropdown').classList.remove('open');
});
</script>
</body>
</html>
