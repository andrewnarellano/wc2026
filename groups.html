<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>2026 FIFA World Cup — Group Stage</title>
  <style>
    :root {
      --navy: #003277;
      --blue: #0070F4;
      --gold: #E8C21A;
      --gray: #4A5567;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: #003277; }

    body {
      background: linear-gradient(135deg, #003277 0%, #0058C7 50%, #0176FF 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }

    header {
      background: var(--navy);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left h1 {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .header-left .subtitle {
      font-size: 0.75rem;
      color: var(--gold);
      margin-top: 2px;
      font-weight: 500;
    }

    .nav-btn {
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 9px 18px;
      border-radius: 6px;
      font-weight: 800;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      letter-spacing: 0.3px;
      transition: background 0.15s;
    }

    .nav-btn:hover { background: #f5d020; }

    .legend {
      display: flex;
      gap: 20px;
      padding: 10px 24px;
      background: rgba(0,0,0,0.25);
      font-size: 0.75rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .dot-green  { background: #22c55e; }
    .dot-red    { background: #ef4444; }
    .dot-neutral { background: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.4); }

    .container {
      padding: 24px;
      max-width: 1440px;
      margin: 0 auto;
    }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .group-card {
      background: var(--navy);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }

    .group-header {
      background: rgba(0,0,0,0.35);
      padding: 9px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .group-title {
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      color: var(--gold);
    }

    .group-meta {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
    }

    .badge-final {
      background: rgba(232,194,26,0.2);
      color: var(--gold);
      border: 1px solid rgba(232,194,26,0.4);
      font-size: 0.62rem;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: rgba(0,0,0,0.2);
      padding: 5px 7px;
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--gray);
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      letter-spacing: 0.3px;
    }

    thead th:first-child {
      text-align: left;
      padding-left: 14px;
    }

    tbody tr.data-row td {
      padding: 8px 7px;
      font-size: 0.81rem;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    tbody tr.data-row td:first-child {
      text-align: left;
      padding-left: 14px;
    }

    .team-cell {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .team-flag { font-size: 1.05rem; line-height: 1; }

    .team-name {
      font-weight: 600;
      white-space: nowrap;
    }

    .status-badge {
      display: inline-block;
      font-size: 0.58rem;
      font-weight: 800;
      padding: 2px 4px;
      border-radius: 3px;
      margin-left: 4px;
      vertical-align: middle;
      letter-spacing: 0.5px;
    }

    .badge-in {
      background: rgba(34,197,94,0.2);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.4);
    }

    .badge-out {
      background: rgba(239,68,68,0.2);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.4);
    }

    /* Row status colors */
    tr.row-qualified td { background: rgba(34,197,94,0.09); }
    tr.row-qualified .team-name { color: #4ade80; }

    tr.row-eliminated td { background: rgba(239,68,68,0.08); }
    tr.row-eliminated .team-name {
      color: #f87171;
    }

    /* GD colors */
    .gd-pos { color: #4ade80; }
    .gd-neg { color: #f87171; }

    /* Pts column */
    .pts-cell { font-weight: 700; color: var(--gold); padding-right: 28px !important; }
    thead th:last-child { padding-right: 28px; }

    /* Advancement note row */
    tr.note-row td {
      padding: 3px 14px 7px 36px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.45;
      background: rgba(0,0,0,0.18);
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    tr.note-row:last-child td { border-bottom: none; }
    tr.data-row:last-child td { border-bottom: none; }

    @media (max-width: 900px) and (orientation: portrait) {
      .container { padding: 12px; }
      .groups-grid { grid-template-columns: 1fr; gap: 12px; }
      thead th { padding: 4px 4px; font-size: 0.63rem; }
      thead th:first-child { padding-left: 10px; }
      thead th:last-child { padding-right: 10px; }
      tbody tr.data-row td { padding: 6px 4px; font-size: 0.75rem; }
      tbody tr.data-row td:first-child { padding-left: 10px; }
      .pts-cell { padding-right: 10px !important; }
      tr.note-row td { padding: 2px 10px 6px 28px; font-size: 0.67rem; }
    }

    @media (max-width: 900px) and (orientation: landscape) {
      .container { padding: 10px; }
      .groups-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .header-left h1 { font-size: 1rem; }
      thead th { padding: 4px 3px; font-size: 0.58rem; }
      thead th:first-child { padding-left: 8px; }
      thead th:last-child { padding-right: 8px; }
      tbody tr.data-row td { padding: 5px 3px; font-size: 0.68rem; }
      tbody tr.data-row td:first-child { padding-left: 8px; }
      .pts-cell { padding-right: 8px !important; }
      tr.note-row td { padding: 2px 8px 5px 22px; font-size: 0.62rem; }
      .team-flag { font-size: 0.9rem; }
      .tpq-wrap { max-width: 100%; }
      .tpq-section { margin-top: 16px; }
    }

    /* ── Third Place Qualifiers ── */
    .tpq-section {
      margin-top: 28px;
    }

    .tpq-wrap {
      max-width: 720px;
      margin: 0 auto;
      background: var(--navy);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }

    tr.tpq-cutoff td {
      border-top: 2px solid rgba(239,68,68,0.6) !important;
    }
  </style>
</head>

function gdClass(gd) {
  if (gd.startsWith('+') && gd !== '+0') return 'gd-pos';
  if (gd.startsWith('-')) return 'gd-neg';
  return '';
}

function render() {
  const container = document.getElementById('groups-container');

  groups.forEach(g => {
    const card = document.createElement('div');
    card.className = 'group-card';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    const metaHtml = g.complete
      ? '<span class="badge-final">FINAL</span>'
      : `<span class="group-meta">Final matchday: ${g.finalGame}</span>`;
    hdr.innerHTML = `<span class="group-title">GROUP ${g.name}</span>${metaHtml}`;
    card.appendChild(hdr);

    // Table
    const table = document.createElement('table');
    table.innerHTML = `
      <thead>
        <tr>
          <th style="width:45%">Team</th>
          <th>GP</th><th>W</th><th>D</th><th>L</th>
          <th>F</th><th>A</th><th>GD</th><th>Pts</th>
        </tr>
      </thead>
    `;

    const tbody = document.createElement('tbody');

    g.teams.forEach(t => {
      const rowClass = t.status === 'qualified' ? 'row-qualified'
                     : t.status === 'eliminated' ? 'row-eliminated'
                     : '';

      const badge = t.status === 'qualified'
        ? '<span class="status-badge badge-in">ADVANCED</span>'
        : t.status === 'eliminated'
        ? '<span class="status-badge badge-out">OUT</span>'
        : '';

      const dataRow = document.createElement('tr');
      dataRow.className = `data-row ${rowClass}`;
      dataRow.innerHTML = `
        <td>
          <div class="team-cell">
            <span class="team-flag">${t.flag}</span>
            <span class="team-name">${t.name}</span>${badge}
          </div>
        </td>
        <td>${t.gp}</td>
        <td>${t.w}</td>
        <td>${t.d}</td>
        <td>${t.l}</td>
        <td>${t.f}</td>
        <td>${t.a}</td>
        <td class="${gdClass(t.gd)}">${t.gd}</td>
        <td class="pts-cell">${t.pts}</td>
      `;
      tbody.appendChild(dataRow);

      const noteRow = document.createElement('tr');
      noteRow.className = 'note-row';
      noteRow.innerHTML = `<td colspan="9">${t.note ? '↳ ' + t.note : '&nbsp;'}</td>`;
      tbody.appendChild(noteRow);
    });

    table.appendChild(tbody);
    card.appendChild(table);
    container.appendChild(card);
  });
}

function parseGdNum(gdStr) {
  return parseInt(gdStr, 10);
}

function renderTPQ() {
  const container = document.getElementById('tpq-container');
  if (!container) return;

  const thirds = [];
  groups.forEach(g => {
    if (!g.complete) return;
    const third = g.teams.find(t => t.status === 'alive');
    if (third) thirds.push({ group: g.name, ...third });
  });

  if (thirds.length === 0) return;

  thirds.sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const gdDiff = parseGdNum(b.gd) - parseGdNum(a.gd);
    if (gdDiff !== 0) return gdDiff;
    return b.f - a.f;
  });

  const showCutoff = thirds.length >= 9;

  const wrap = document.createElement('div');
  wrap.className = 'tpq-wrap';

  const hdr = document.createElement('div');
  hdr.className = 'group-header';
  hdr.innerHTML = `<span class="group-title">THIRD PLACE QUALIFIERS</span><span class="group-meta">${thirds.length} of 12 groups complete</span>`;
  wrap.appendChild(hdr);

  const table = document.createElement('table');
  table.innerHTML = `
    <thead>
      <tr>
        <th style="text-align:center">Grp</th>
        <th style="text-align:left; padding-left:14px; width:35%">Team</th>
        <th>GP</th><th>W</th><th>D</th><th>L</th>
        <th>F</th><th>A</th><th>GD</th><th>Pts</th>
      </tr>
    </thead>
  `;

  const tbody = document.createElement('tbody');
  thirds.forEach((t, i) => {
    const row = document.createElement('tr');
    row.className = 'data-row';
    if (showCutoff && i === 8) row.classList.add('tpq-cutoff');

    row.innerHTML = `
      <td style="text-align:center; color:rgba(255,255,255,0.45); font-size:0.75rem; font-weight:700">${t.group}</td>
      <td>
        <div class="team-cell">
          <span class="team-flag">${t.flag}</span>
          <span class="team-name">${t.name}</span>
        </div>
      </td>
      <td>${t.gp}</td>
      <td>${t.w}</td>
      <td>${t.d}</td>
      <td>${t.l}</td>
      <td>${t.f}</td>
      <td>${t.a}</td>
      <td class="${gdClass(t.gd)}">${t.gd}</td>
      <td class="pts-cell">${t.pts}</td>
    `;
    tbody.appendChild(row);
  });

  table.appendChild(tbody);
  wrap.appendChild(table);
  container.appendChild(wrap);
}

render();
renderTPQ();
</script>
</body>
</html>
